<html>
    <head>
        <title>Practica Objetos</title>
    </head>
    <body>
        <button onclick="ejercicio1()">Ejercicio1</button>
        <button onclick="ejercicio2()">Ejercicio2</button>
        <button onclick="ejercicio3()">Ejercicio3</button>
        <button onclick="ejercicio4()">Ejercicio4</button>
        <button onclick="ejercicio5()">Ejercicio5</button>
        <button onclick="ejercicio6()">Ejercicio6</button>

        <script>
            // Objetos:
            let persona = {
                // Propiedades:
                nombre: "Juan",
                edad: "18",
                profesion: "SMX",
                // Metodo dentro del objeto:
                saludar: function() {
                    alert("Hola soy " + this.nombre);
                }
            }

            function ejercicio1() {
                alert("Nombre: " + persona.nombre)
                alert("Edad: " + persona.edad)
                alert("Profesion: " + persona.profesion)
            }

            function ejercicio2() {
                persona.pais = "España"
                alert("Pais agregado: " + persona.pais)
            }

            persona.saludar = function() {
                alert("Hola soy " + this.nombre);
            }

            function ejercicio3() {
                persona.saludar()
            }

            function ejercicio4() {
                for (let propiedad in persona) {
                    alert(propiedad + ": " + persona[propiedad])
                }
            }

            function ejercicio5() {
                let coche = {
                    marca: "BMW",
                    modelo: "BMW Z4",
                    modelo: {
                        motor: "Super rapido",
                        caballos: "67 Mil"
                    }
                }
                alert("Motor: " + coche.modelo.motor)
            }

            let calculadora = {
                operando1: 0,
                operando2: 0,

                sumar: function() {
                    return this.operando1 + this.operando2
                },
                restar: function() {
                    return this.operando1 - this.operando2
                },
                multiplicar: function() {
                    return this.operando1 * this.operando2
                },
                dividir: function() {
                    return this.operando1 / this.operando2
                }
            }

            function ejercicio6() {
                calculadora.operando1 = parseFloat(prompt("Introduce un numero"))
                calculadora.operando2 = parseFloat(prompt("Introduce otro numero:"))
                let operacion = prompt("Elige la operacion (+, -, *, /).")
                let resultado = 0

                if (operacion === "+") { resultado = calculadora.sumar() }
                else if (operacion === "-") { resultado = calculadora.restar() }
                else if (operacion === "*") { resultado = calculadora.multiplicar() }
                else if (operacion === "/") { resultado = calculadora.dividir() }

                alert("El resultado es: " + resultado)
            }
        </script>
    </body>
</html>
